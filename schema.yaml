    title: "Object Storage compartment 3 (optional)"
    required: false

  network_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Network compartment 1"
    required: false
  network_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Network compartment 2 (optional)"
    required: false
  network_compartment_id_3:
    type: oci:identity:compartment:id
    title: "Network compartment 3 (optional)"
    required: false

  vault_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Vault compartment 1"
    required: false
  vault_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Vault compartment 2 (optional)"
    required: false
  vault_compartment_id_3:
    type: oci:identity:compartment:id
    title: "Vault compartment 3 (optional)"
    required: false

  compute_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Compute compartment 1"
    required: false
  compute_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Compute compartment 2 (optional)"
    required: false
  compute_compartment_id_3:
    type: oci:identity:compartment:id
    title: "Compute compartment 3 (optional)"
    required: false

  volume_group_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Volume group compartment 1"
    required: false
  volume_group_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Volume group compartment 2 (optional)"
    required: false
  volume_group_compartment_id_3:
    type: oci:identity:compartment:id
    title: "Volume group compartment 3 (optional)"
    required: false

  file_system_compartment_id_1:
    type: oci:identity:compartment:id
    title: "File system compartment 1"
    required: false
  file_system_compartment_id_2:
    type: oci:identity:compartment:id
    title: "File system compartment 2 (optional)"
    required: false
  file_system_compartment_id_3:
    type: oci:identity:compartment:id
    title: "File system compartment 3 (optional)"
    required: false

  database_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Database compartment 1"
    required: false
  database_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Database compartment 2 (optional)"
    required: false
  database_compartment_id_3:
    type: oci:identity:compartment:id
    title: "Database compartment 3 (optional)"
    required: false

  autonomous_database_compartment_id_1:
    type: oci:identity:compartment:id
    title: "Autonomous Database compartment 1"
    required: false
  autonomous_database_compartment_id_2:
    type: oci:identity:compartment:id
    title: "Autonomous Database compartment 2 (optional)"
    required: false
  autonomous_database_compartment_id_3:
